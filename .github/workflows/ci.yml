# Rust CI for taut-rpc.
#
# Runs formatting, clippy, tests, and an MSRV build check on PRs and pushes to
# main. Most jobs are marked `continue-on-error: true` for Day 0 since stub
# code may not be clean yet — flip these to required once Phase 1 lands.

name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  rust-clippy:
    name: clippy
    runs-on: ubuntu-latest
    # Make this required once Phase 1 lands.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  rust-test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Make this required once Phase 1 lands.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-targets

  rust-test-ws:
    name: test (ws feature)
    runs-on: ubuntu-latest
    # Make this required once Phase 1 lands.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --features ws

  rust-msrv:
    name: msrv (1.85)
    runs-on: ubuntu-latest
    # Make this required once Phase 1 lands.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@1.85
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace

  examples-build:
    name: Build examples
    runs-on: ubuntu-latest
    needs: rust-test
    continue-on-error: true  # Until all examples are stable.
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v6
        with: { node-version: 20 }
      - uses: Swatinem/rust-cache@v2
      - name: Build server examples
        run: |
          for dir in examples/*/server; do
            if [ -f "$dir/Cargo.toml" ]; then
              echo "::group::cargo build in $dir"
              (cd "$dir" && cargo build)
              echo "::endgroup::"
            fi
          done
      - name: Install client examples
        run: |
          # Build the npm runtime first.
          (cd npm/taut-rpc && npm install && npm run build)
          for dir in examples/*/client; do
            if [ -f "$dir/package.json" ]; then
              echo "::group::npm install in $dir"
              (cd "$dir" && npm install)
              echo "::endgroup::"
            fi
          done
