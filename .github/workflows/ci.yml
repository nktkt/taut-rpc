# Rust CI for taut-rpc.
#
# Runs formatting, clippy, tests, and an MSRV build check on PRs and pushes to
# main. Most jobs are marked `continue-on-error: true` for Day 0 since stub
# code may not be clean yet — flip these to required once Phase 1 lands.

name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust-fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  rust-clippy:
    name: clippy
    runs-on: ubuntu-latest
    # Make this required once Phase 1 lands.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  rust-test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    # Make this required once Phase 1 lands.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-targets

  rust-msrv:
    name: msrv (1.75)
    runs-on: ubuntu-latest
    # Make this required once Phase 1 lands.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.100
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace
