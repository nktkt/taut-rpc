# cargo-deny configuration. Run with `cargo deny check`.
# See https://embarkstudios.github.io/cargo-deny/
#
# Refreshed for v0.1.0. Policy stance for the first published release:
#   * licenses: permissive + weak-copyleft only (MIT/Apache-2.0/BSD/ISC/MPL-2.0
#     family). Some entries on the allow-list are forward-looking — they cover
#     common Rust ecosystem licenses we'd hit as the dep graph grows, even if
#     no current dep uses them. cargo-deny emits "license-not-encountered"
#     warnings for those; that's expected and intentional.
#   * bans: `multiple-versions = "warn"` (don't deny — transitive deps
#     routinely pull duplicates we can't control). `wildcards = "deny"` with
#     `allow-wildcard-paths = true` so internal workspace `path = ".."`
#     dev-deps don't trip the wildcard rule (they never ship).
#   * advisories: warn-only on yanked; RustSec DB drives the rest.
#
# Sweep again at the next minor release to tighten further (e.g. flip
# multiple-versions to "deny" once we've audited duplicates, audit any
# accumulated `skip` / `ignore` entries).
#
# tested with cargo-deny 0.19

[graph]
all-features = false
no-default-features = false
exclude = []

[output]
feature-depth = 1

# ---------------------------------------------------------------------------
# Advisories: catch yanked or insecure dependencies via RustSec.
# ---------------------------------------------------------------------------
[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "warn"
ignore = []

# ---------------------------------------------------------------------------
# Licenses: dual MIT OR Apache-2.0 for our own crates; tolerate common
# permissive / weak-copyleft licenses for transitive deps. GPL-family
# copyleft is rejected by omission from `allow` (cargo-deny denies anything
# not on the allow-list).
# ---------------------------------------------------------------------------
[licenses]
confidence-threshold = 0.93
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",
    "Zlib",
    "MPL-2.0",
    "0BSD",
    "CC0-1.0",
]
exceptions = []

# ---------------------------------------------------------------------------
# Bans: warn on duplicate versions for now (Day-0 noise). Wildcards remain
# denied — pin or use caret/tilde ranges instead.
# ---------------------------------------------------------------------------
[bans]
multiple-versions = "warn"
wildcards = "deny"
# Internal workspace crates depend on each other via `path = ".."` (no
# version), which cargo-deny otherwise flags as a wildcard. These are
# dev-deps used only for tests/benches and never escape the workspace.
allow-wildcard-paths = true
highlight = "all"
allow = []
deny = []
skip = []
skip-tree = []

# ---------------------------------------------------------------------------
# Sources: only crates.io is fully trusted. Unknown registries / git remotes
# warn rather than fail so contributors aren't blocked, but they show up in
# review.
# ---------------------------------------------------------------------------
[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
